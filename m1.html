<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>音乐咖</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-image: url('t6.jpg'); /* 背景图片 */
            background-size: cover; /* 背景图片尺寸调整 */
            background-repeat: no-repeat; /* 不重复背景图片 */
            background-position: center center; /* 背景图片居中 */
            margin: 0; /* 移除默认外边距 */
            padding: 0; /* 移除默认内边距 */
            display: flex; /* 使用 flexbox 布局 */
            justify-content: center; /* 居中对齐内容 */
            align-items: center; /* 垂直居中 */
            min-height: 100vh; /* 视口高度 */
        }

        .container {
            display: flex;
            justify-content: space-between;
            padding: 20px;
            /* 去掉背景色 */
            width: 80%; /* 宽度为80% */
            max-width: 1000px; /* 最大宽度1000px */
            margin: 0 auto; /* 居中对齐 */
        }

        .left-panel, .right-panel {
            padding: 20px;
            background-color: rgba(255, 255, 255, 0.8); /* 半透明背景 */
            border-radius: 10px; /* 圆角边框 */
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1); /* 投影效果 */
        }

        .left-panel {
            display: flex;
            flex-direction: column;
            margin-right: 20px; /* 右侧面板和左侧面板之间的间距 */
        }

        .a-button {
            margin-bottom: 10px; /* 按钮底部间距 */
        }

        .right-panel {
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .right-panel button {
            margin-bottom: 20px; /* 按钮底部间距 */
        }

        button {
            padding: 10px;
            font-size: 16px;
            cursor: pointer;
        }

        .status {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: rgba(255, 255, 255, 0.8); /* 半透明白色背景 */
            border: 1.2px solid rgb(174, 174, 255); /* 亮蓝色边框 */
            border-radius: 5px; /* 圆角边框 */
            padding: 10px; /* 内边距 */
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1); /* 投影效果 */
            text-align: center; /* 文本居中 */
            font-size: 18px; /* 字体大小 */
            font-weight: bold; /* 字体加粗 */
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="left-panel">
            <button class="a-button" data-audio="边境.mp3">边境</button>
            <button class="a-button" data-audio="地平线1.mp3">地平线1</button>
            <button class="a-button" data-audio="加勒比海盗.mp3">加勒比海盗</button>
            <button class="a-button" data-audio="江山令.mp3">江山令</button>
            <button class="a-button" data-audio="乐高主题曲.mp3">乐高主题曲</button>
            <button class="a-button" data-audio="黎鸣.mp3">黎鸣</button>
            <button class="a-button" data-audio="新贵妃醉酒.mp3">新贵妃醉酒</button>
            <button class="a-button" data-audio="循迹.mp3">循迹</button>
            <button class="a-button" data-audio="异客.mp3">异客</button>
            <button class="a-button" data-audio="异客[改].mp3">异客[改]</button>
        </div>
        <div class="right-panel">
            <button id="b1">循环播放</button>
            <button id="b2">列表循环</button>
            <button id="b3">停止音乐</button>
        </div>
    </div>
    <div class="status">
        <p id="status-text">请选择一个按钮播放音乐</p>
    </div>
    <audio id="audio-player"></audio>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const audioPlayer = document.getElementById('audio-player');
            const statusText = document.getElementById('status-text');
            let currentAButton = null;
            let loopSingle = false;
            let loopAll = false;
            const aButtons = document.querySelectorAll('.a-button');
            const b1Button = document.getElementById('b1');
            const b2Button = document.getElementById('b2');
            const b3Button = document.getElementById('b3');

            aButtons.forEach(button => {
                button.addEventListener('click', () => {
                    const audioFile = button.getAttribute('data-audio');
                    audioPlayer.src = audioFile;
                    audioPlayer.play();
                    currentAButton = button;
                    loopSingle = false;
                    loopAll = false;
                    updateStatus(`正在播放 ${button.textContent}`);
                });
            });

            b1Button.addEventListener('click', () => {
                if (currentAButton) {
                    if (loopSingle) {
                        audioPlayer.loop = false;
                        loopSingle = false;
                        updateStatus(`停止循环播放 ${currentAButton.textContent}`);
                    } else {
                        audioPlayer.loop = true;
                        loopSingle = true;
                        loopAll = false;
                        updateStatus(`循环播放 ${currentAButton.textContent}`);
                    }
                }
            });

            b2Button.addEventListener('click', () => {
                loopSingle = false;
                loopAll = true;
                playAll();
                updateStatus("列表循环中");
            });

            b3Button.addEventListener('click', () => {
                audioPlayer.pause();
                audioPlayer.currentTime = 0;
                loopSingle = false;
                loopAll = false;
                updateStatus("音乐已停止");
            });

            audioPlayer.addEventListener('ended', () => {
                if (loopSingle) {
                    audioPlayer.play();
                } else if (loopAll) {
                    playNext();
                }
            });

            function playAll() {
                audioPlayer.loop = false;
                playNext();
            }

            function playNext() {
                const currentIndex = Array.from(aButtons).indexOf(currentAButton);
                const nextIndex = (currentIndex + 1) % aButtons.length;
                currentAButton = aButtons[nextIndex];
                const nextAudioFile = currentAButton.getAttribute('data-audio');
                audioPlayer.src = nextAudioFile;
                audioPlayer.play();
                updateStatus(`正在播放 ${currentAButton.textContent}`);
            }

            function updateStatus(text) {
                statusText.textContent = text;
            }
        });
    </script>
</body>
</html>
